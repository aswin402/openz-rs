<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="docGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="docGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="docGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Particle -->
    <circle id="particle" r="2" fill="#60a5fa" opacity="0.8"/>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="40" fill="url(#bgGrad)"/>

  <!-- Decorative grid lines -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
  </g>

  <!-- Rotating ring -->
  <circle cx="200" cy="200" r="130" fill="none" stroke="url(#ringGrad)" stroke-width="2" stroke-dasharray="80 20 40 20">
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="200" r="110" fill="none" stroke="url(#ringGrad)" stroke-width="1" stroke-dasharray="30 15 60 15" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="360 200 200" to="0 200 200" dur="15s" repeatCount="indefinite"/>
  </circle>

  <!-- Document icon (centerpiece) -->
  <g filter="url(#softGlow)">
    <!-- Document body -->
    <path d="M160 130 L220 130 L260 170 L260 270 L160 270 Z" fill="url(#docGrad1)" rx="8" opacity="0.95">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
    </path>
    <!-- Document fold -->
    <path d="M220 130 L220 170 L260 170 Z" fill="url(#docGrad2)" opacity="0.6"/>
    <!-- Text lines on document -->
    <rect x="172" y="190" width="70" height="4" rx="2" fill="#ffffff" opacity="0.6">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <rect x="172" y="205" width="55" height="4" rx="2" fill="#ffffff" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="172" y="220" width="65" height="4" rx="2" fill="#ffffff" opacity="0.5">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="172" y="235" width="45" height="4" rx="2" fill="#ffffff" opacity="0.4">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- MCP Bolt on top -->
  <g filter="url(#glow)" transform="translate(248, 142)">
    <path d="M0 -15 L18 -15 L8 2 L16 2 L-2 22 L4 8 L-6 8 Z" fill="url(#boltGrad)">
      <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;-1,-1;0,0" dur="2s" repeatCount="indefinite" additive="sum"/>
    </path>
  </g>

  <!-- Floating document icons orbiting -->
  <!-- DOCX -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="20s" repeatCount="indefinite"/>
    <g transform="translate(200, 60)">
      <rect x="-18" y="-12" width="36" height="24" rx="3" fill="url(#docGrad1)" opacity="0.85"/>
      <text x="-10" y="4" font-family="monospace" font-size="8" fill="#fff" font-weight="bold" opacity="0.9">D</text>
    </g>
  </g>

  <!-- PDF -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="120 200 200" to="480 200 200" dur="20s" repeatCount="indefinite"/>
    <g transform="translate(310, 130)">
      <rect x="-18" y="-12" width="36" height="24" rx="3" fill="url(#docGrad2)" opacity="0.85"/>
      <text x="-10" y="4" font-family="monospace" font-size="8" fill="#fff" font-weight="bold" opacity="0.9">P</text>
    </g>
  </g>

  <!-- PPTX -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="240 200 200" to="600 200 200" dur="20s" repeatCount="indefinite"/>
    <g transform="translate(100, 290)">
      <rect x="-18" y="-12" width="36" height="24" rx="3" fill="url(#docGrad3)" opacity="0.85"/>
      <text x="-10" y="4" font-family="monospace" font-size="8" fill="#fff" font-weight="bold" opacity="0.9">S</text>
    </g>
  </g>

  <!-- XLSX -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="60 200 200" to="420 200 200" dur="25s" repeatCount="indefinite"/>
    <g transform="translate(80, 110)">
      <rect x="-18" y="-12" width="36" height="24" rx="3" fill="url(#docGrad3)" opacity="0.7"/>
      <text x="-10" y="4" font-family="monospace" font-size="8" fill="#fff" font-weight="bold" opacity="0.9">X</text>
    </g>
  </g>

  <!-- HTML -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="180 200 200" to="540 200 200" dur="25s" repeatCount="indefinite"/>
    <g transform="translate(310, 270)">
      <rect x="-18" y="-12" width="36" height="24" rx="3" fill="url(#docGrad1)" opacity="0.7"/>
      <text x="-10" y="4" font-family="monospace" font-size="8" fill="#fff" font-weight="bold" opacity="0.9">H</text>
    </g>
  </g>

  <!-- Floating particles -->
  <use href="#particle" x="120" y="80">
    <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="80;60;80" dur="3s" repeatCount="indefinite"/>
  </use>
  <use href="#particle" x="300" y="100">
    <animate attributeName="opacity" values="0;0.6;0" dur="4s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="100;80;100" dur="4s" begin="1s" repeatCount="indefinite"/>
  </use>
  <use href="#particle" x="80" y="250">
    <animate attributeName="opacity" values="0;0.7;0" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="250;230;250" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
  </use>
  <use href="#particle" x="320" y="300">
    <animate attributeName="opacity" values="0;0.5;0" dur="4.5s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="300;280;300" dur="4.5s" begin="2s" repeatCount="indefinite"/>
  </use>

  <!-- Text label at bottom -->
  <text x="200" y="355" text-anchor="middle" font-family="monospace, sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0" letter-spacing="3">
    OPENDOC
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </text>
  <text x="200" y="375" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#64748b" letter-spacing="2">
    MCP SERVER
  </text>
</svg>
